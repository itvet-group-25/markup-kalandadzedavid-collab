<!doctype html>
<html lang="ka">
  <head>
    <meta charset="UTF-8" />
    <title>br, sub, sup მაგალითები</title>
  </head>
  <body>
    <h1>ხაზის გადატანა — &lt;br&gt;</h1>

    <p>
      ნინო ჩხეიძე<br />
      ვაჟა-ფშაველას გამზირი, № 15<br />
      ბინა 3<br />
      თბილისი, საქართველო
    </p>

    <hr />

    <h1>ქვედა ინდექსი — &lt;sub&gt;</h1>

    <p>წყალი: H<sub>2</sub>O</p>
    <p>ნახშირორჟანგი: CO<sub>2</sub></p>
    <p>გლუკოზა: C<sub>6</sub>H<sub>12</sub>O<sub>6</sub></p>

    <hr />

    <h1>ზედა ინდექსი — &lt;sup&gt;</h1>

    <p>კვადრატი: x<sup>2</sup></p>
    <p>კუბი: y<sup>3</sup></p>
    <p>ეინშტეინი: E = mc<sup>2</sup></p>
    <p>ორის სიმძლავრე: 2<sup>8</sup> = 256</p>
  </body>
</html>
